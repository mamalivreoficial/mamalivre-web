<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMALIVRE | Proposta Final Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --soft-pink: #ffbbf1;
            --candy-pink: #ff00ff;
            --neon-teal: #00ffcc;
            --font-main: 'Syncopate', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* HERO ONLY GALAXY */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 255, 0.08) 0%, transparent 70%);
            overflow: hidden;
        }

        .nebula {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
        }

        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* GLOBAL SPARKLE CANVAS */
        #sparkle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        .dummy-content {
            height: 2000px;
            padding: 100px;
            text-align: center;
            background: linear-gradient(to bottom, #050505, #0a0a0a);
        }

        .dummy-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            margin: 50px auto;
            max-width: 600px;
            border-radius: 20px;
        }

        .label {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: var(--neon-teal);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <canvas id="hero-canvas"></canvas>
        <div class="nebula"></div>
        <div class="nebula" style="top: 60%; left: 70%; background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 70%);"></div>
    </div>

    <!-- SITE-WIDE SPARKLES -->
    <canvas id="sparkle-canvas"></canvas>

    <div class="dummy-content">
        <div class="label">ROLAGEM DO SITE (PRODUTOS)</div>
        <div class="dummy-card">
            <h3>Visual Limpo & Elegante</h3>
            <p style="color: #888; font-family: sans-serif;">O fundo agressivo some. Ficam apenas as estrelas delicadas e os brilhos do mouse que te seguem no site todo.</p>
        </div>
        <div class="dummy-card">
            <h3>Fofo & Luxuoso</h3>
            <p style="color: #888; font-family: sans-serif;">Brilhos mais sutis e sofisticados para destacar as peças.</p>
        </div>
    </div>

    <script>
        // --- HERO TEXT PARTICLES (Syncopate + Poeira Estelar) ---
        const hCanvas = document.getElementById('hero-canvas');
        const hCtx = hCanvas.getContext('2d');
        let width, height;
        let particles = [];

        function initHero() {
            width = hCanvas.width = window.innerWidth;
            height = hCanvas.height = window.innerHeight;
            createParticles();
        }

        function createParticles() {
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.width = width;
            tCanvas.height = height;

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 80px Syncopate';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText('MAMALIVRE', width / 2, height / 2);

            // Draw Hearts
            tCtx.font = '50px Arial'; 
            tCtx.fillText('♥', width / 2 - 280, height / 2);
            tCtx.fillText('♥', width / 2 + 280, height / 2);

            const imgData = tCtx.getImageData(0, 0, width, height).data;
            particles = [];
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    if (imgData[(y * width + x) * 4 + 3] > 128) {
                        particles.push({
                            x: Math.random() * width,
                            y: Math.random() * height,
                            baseX: x,
                            baseY: y,
                            color: '#fff',
                            size: Math.random() * 1.5
                        });
                    }
                }
            }
        }

        function animateHero() {
            hCtx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += (p.baseX - p.x) * 0.08;
                p.y += (p.baseY - p.y) * 0.08;
                hCtx.fillStyle = p.color;
                hCtx.beginPath();
                hCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                hCtx.fill();
                
                if (Math.random() > 0.98) {
                    hCtx.fillStyle = 'rgba(255, 187, 241, 0.5)';
                    hCtx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    hCtx.fill();
                }
            });
            requestAnimationFrame(animateHero);
        }

        // --- GLOBAL SPARKLES (Sutil em todo o site) ---
        const sCanvas = document.getElementById('sparkle-canvas');
        const sCtx = sCanvas.getContext('2d');
        let sparkles = [];
        let mouse = { x: -100, y: -100 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            if (Math.random() > 0.6) { // Reduced frequency for elegance
                sparkles.push({
                    x: mouse.x,
                    y: mouse.y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 3 + 1,
                    alpha: 1,
                    char: ['✦', '✧', '✨'][Math.floor(Math.random() * 3)]
                });
            }
        });

        function animateSparkles() {
            sCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            sCanvas.width = window.innerWidth;
            sCanvas.height = window.innerHeight;

            sparkles.forEach((s, i) => {
                s.x += s.vx;
                s.y += s.vy;
                s.alpha -= 0.015;
                if (s.alpha <= 0) sparkles.splice(i, 1);
                
                sCtx.globalAlpha = s.alpha;
                sCtx.fillStyle = '#ffbbf1';
                sCtx.font = `${s.size * 4}px Arial`;
                sCtx.fillText(s.char, s.x, s.y);
            });
            requestAnimationFrame(animateSparkles);
        }

        initHero();
        animateHero();
        animateSparkles();
    </script>
</body>
</html>
