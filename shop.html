        <h1 class="logo-neon-text" id="dyn-shopLogo" style="font-size: 3rem; margin-bottom: 1rem; color: #fff;">LOJA</h1>

        <!-- Dynamic Filter Bar Container -->
        <div class="shop-filters" id="dynamic-shop-filters" style="margin-top: 2rem; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
            <!-- Buttons injected by script.js -->
        </div>

    <section class="section">
        <div class="container">
            <div class="product-grid" id="shop-product-grid">
